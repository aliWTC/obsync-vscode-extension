name: Bug report
description: Report a reproducible problem with Obsync
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A clear and concise description of the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps so we can reproduce quickly.
      placeholder: |
        1. Open workspace ...
        2. Run "Obsync: Sync Entire Project"
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Obsync version
      placeholder: e.g. 0.1.3
    validations:
      required: true
  - type: input
    id: vscode
    attributes:
      label: VS Code version
      placeholder: e.g. 1.100.2
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant output/channel logs.
